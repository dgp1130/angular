<h1>Angular WebMCP</h1>

<div class="box">
  <h2>Global State</h2>
  <app-global-username />
</div>

<div class="box">
  <h2>Counter</h2>
  <button (click)="toggle()">Toggle Counter</button>
  @if (showCounter()) {
    <app-counter />
  }
</div>

<div class="box">
  <h2>Multiple Components</h2>
  <div>Users to follow:</div>
  <ul>
    <li>
      <app-view-user handle="@marktechson" />
    </li>
    <li>
      <app-view-user handle="@punderwoman" />
    </li>
    <li>
      <app-view-user handle="@synalx" />
    </li>
  </ul>
</div>

<div class="box">
  <h2>Signal Forms</h2>
  <app-update-user-form />
</div>
